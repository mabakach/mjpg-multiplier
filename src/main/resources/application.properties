spring.application.name=mjpg-multiplier-server

# disable timeout
server.tomcat.connection-timeout=0
server.tomcat.keep-alive-timeout=0

# Application configuration
#stream.url=http://birdbox:7123/stream.mjpg
stream.url=https://birdbox.home.mabaka.ch/api/stream.mjpg?_ts=1777132828519

# myStrom switch config
mystrom.baseUrl=http://192.168.5.134

# myStrom API paths (defaults match common myStrom device API)
# statePath is the GET endpoint to read current relay state
mystrom.statePath=/report
# actionPath is the endpoint to request a power cycle; default issues a 10s cycle
mystrom.actionPath=/power_cycle?time=10
# endpoint to set relay state (POST payload {"turn":0|1})
mystrom.setRelayPath=/relay

# Expose all actuator endpoints and show health details
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always